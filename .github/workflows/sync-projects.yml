# Pulls #project-tagged posts from the Stable Structure Facebook Page, rebuilds
# the site and commits the result. GitHub Pages then serves the updated gallery.
#
# Setup before this can run:
#   Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret
#     FB_PAGE_ID     numeric Facebook Page ID
#     FB_PAGE_TOKEN  Page access token (prefer a non-expiring System User token)
#
# The scheduled trigger is commented out on purpose — run it manually from the
# Actions tab first to confirm the token works, then uncomment to go automatic.
name: Sync Facebook projects

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'   # every 6 hours (UTC)

permissions:
  contents: write

concurrency:
  group: sync-projects
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch tagged posts from Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: node build/fetch-facebook.js

      - name: Rebuild site
        run: node build/generate.js

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/projects build/projects.facebook.json *.html sitemap.xml
          if git diff --staged --quiet; then
            echo "No new projects — nothing to commit."
          else
            git commit -m "Sync projects from Facebook [skip ci]"
            git push
          fi
